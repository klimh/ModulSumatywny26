name: CI - Fullstack (Python Backend + JS Frontend)

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]

jobs:
  # sprawdzenie backendu (python)
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Konfiguracja Pythona
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalacja bibliotek Pythona
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  # sprawdzenie frontendu JS
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Konfiguracja Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalacja i Build Frontendu
        working-directory: ./frontend
        run: |
          npm install
          npm run build --if-present
        
  # budowanie obrazu Docker 
  docker-check:
    needs: [backend-tests, frontend-build] 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Testowy Build Dockera
        run: docker build . --file Dockerfile
